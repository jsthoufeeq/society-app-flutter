name: society_app
description: Society management app with subscriptions, payments, and ads.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------- State management ----------
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---------- Navigation ----------
  go_router: ^13.2.0

  # ---------- Networking ----------
  dio: ^5.4.3
  retrofit: ^4.1.0          # type-safe API client generator

  # ---------- Local storage ----------
  flutter_secure_storage: ^9.0.0   # JWT tokens
  shared_preferences: ^2.2.3        # app settings

  # ---------- Payments ----------
  razorpay_flutter: ^1.3.6

  # ---------- Ads ----------
  google_mobile_ads: ^5.1.0

  # ---------- Notifications ----------
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.1.2

  # ---------- UI ----------
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0            # loading skeletons
  lottie: ^3.1.0             # animations
  flutter_svg: ^2.0.10
  intl: ^0.19.0              # date + currency formatting
  pinput: ^5.0.0             # OTP input field

  # ---------- PDF receipts ----------
  pdf: ^3.10.8
  printing: ^5.12.0

  # ---------- Utilities ----------
  equatable: ^2.0.5          # value equality for models
  json_annotation: ^4.9.0
  envied: ^0.5.4             # .env file loader
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
